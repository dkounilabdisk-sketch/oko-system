<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKOин — вход</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f0ea, #c8dfd6); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 28px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px 16px; margin: 8px 0; border-radius: 60px; border: 1px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #2d6a4f; color: white; border: none; padding: 12px; border-radius: 60px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        h1 { margin-bottom: 24px; background: linear-gradient(135deg,#2d6a4f,#9b6bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .error { color: red; margin-top: 12px; }
        .success { color: green; margin-top: 12px; }
    </style>
</head>
<body>
<div id="app">
    <div class="card">
        <h1>🏆 OKOин</h1>
        <input type="text" id="loginLogin" placeholder="Логин">
        <input type="password" id="loginPass" placeholder="Пароль" onkeypress="if(event.key==='Enter') doLogin()">
        <button onclick="doLogin()">Войти</button>
        <div id="message" class="error"></div>
    </div>
</div>

<script>
    // Конфигурация Supabase
    const SUPABASE_URL = 'https://ryyhpmeyqqgptwxmczqa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_0BxkLpWWHDGPmxGdm31ywg_ZWGrjCf4';

    let currentUser = null;

    async function doLogin() {
        const login = document.getElementById('loginLogin').value.trim();
        const password = document.getElementById('loginPass').value;
        const msgDiv = document.getElementById('message');

        if (!login || !password) {
            msgDiv.innerText = 'Введите логин и пароль';
            return;
        }

        try {
            const url = `${SUPABASE_URL}/rest/v1/users?login=eq.${encodeURIComponent(login)}&password=eq.${encodeURIComponent(password)}`;
            const response = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            const data = await response.json();

            if (data && data.length > 0) {
                currentUser = data[0];
                if (currentUser.status === 'archived') {
                    msgDiv.innerText = 'Аккаунт архивирован';
                    return;
                }
                // Показать основной интерфейс
                showMain();
            } else {
                msgDiv.innerText = 'Неверный логин или пароль';
            }
        } catch (err) {
            console.error(err);
            msgDiv.innerText = 'Ошибка соединения с сервером';
        }
    }

    function showMain() {
        const isManager = currentUser.role === 'manager';
        document.getElementById('app').innerHTML = `
            <div style="max-width: 800px; margin: 0 auto;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>👋 Привет, ${currentUser.name}</h2>
                        <button onclick="doLogout()" style="width: auto;">Выйти</button>
                    </div>
                    <p>⭐ Рейтинг: ${currentUser.rating} | 💰 Баланс: ${currentUser.points} OKO</p>
                    <p>Роль: ${isManager ? 'Менеджер' : 'Сотрудник'}</p>
                    <hr>
                    <p>✅ Вы успешно вошли в систему.</p>
                    <p>Дальше мы добавим список сотрудников, призы, достижения и историю.</p>
                </div>
            </div>
        `;
    }

    function doLogout() {
        currentUser = null;
        // Перезагружаем страницу, чтобы вернуть форму входа (проще всего)
        location.reload();
    }

    window.doLogin = doLogin;
    window.doLogout = doLogout;
</script>
</body>
</html>
