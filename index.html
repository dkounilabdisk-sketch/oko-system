<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКОИНЫ — вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f0ea 0%, #c8dfd6 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .card { background: white; border-radius: 28px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 24px; background: linear-gradient(135deg,#2d6a4f,#9b6bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border-radius: 60px; border: 1px solid #cbd5e1; font-size: 16px; }
        button { width: 100%; background: #2d6a4f; color: white; border: none; padding: 12px; border-radius: 60px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error { color: red; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
<div id="app">
    <div class="card">
        <h1>🏆 ОКОИНЫ</h1>
        <input type="text" id="loginLogin" placeholder="Логин">
        <input type="password" id="loginPass" placeholder="Пароль" onkeypress="if(event.key==='Enter') doLogin()">
        <button onclick="doLogin()">Войти</button>
        <div id="errorMsg" class="error"></div>
    </div>
</div>

<script>
// ========== КОНФИГУРАЦИЯ ==========
const SUPABASE_URL = 'https://ryyhpmeyqqgptwxmczqa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_0BxkLpWWHDGPmxGdm31ywg_ZWGrjCf4';

// ========== АПИ ЗАПРОС ==========
async function apiFetch(url, options = {}) {
    try {
        const res = await fetch(url, {
            ...options,
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                ...options.headers
            }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (e) {
        console.error(e);
        return null;
    }
}

// ========== ВХОД ==========
async function doLogin() {
    const login = document.getElementById('loginLogin').value.trim();
    const password = document.getElementById('loginPass').value;
    const errorDiv = document.getElementById('errorMsg');
    
    if (!login || !password) {
        errorDiv.innerText = 'Введите логин и пароль';
        return;
    }
    
    const data = await apiFetch(`${SUPABASE_URL}/rest/v1/users?login=eq.${encodeURIComponent(login)}&password=eq.${encodeURIComponent(password)}`);
    
    if (data && data.length) {
        const user = data[0];
        if (user.status === 'archived') {
            errorDiv.innerText = 'Аккаунт архивирован';
            return;
        }
        // Сохраняем пользователя
        localStorage.setItem('oko_current_user', JSON.stringify(user));
        // Переходим на основную страницу
        window.location.href = 'main.html';
    } else {
        errorDiv.innerText = 'Неверный логин или пароль';
    }
}

window.doLogin = doLogin;
</script>
</body>
</html>
</html>
