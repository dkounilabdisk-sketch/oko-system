<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКОИНЫ — вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Inter', sans-serif; background: linear-gradient(135deg, #e0f0ea 0%, #c8dfd6 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 28px; padding: 32px; max-width: 400px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 24px; background: linear-gradient(135deg,#2d6a4f,#9b6bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        input { width: 100%; padding: 12px 16px; margin-bottom: 16px; border-radius: 60px; border: 1px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #2d6a4f; color: white; border: none; padding: 12px; border-radius: 60px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1f543f; }
        .error { color: #dc2626; margin-top: 12px; text-align: center; font-size: 14px; }
        .success { color: #2d6a4f; margin-top: 12px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h1>🏆 ОКОИНЫ</h1>
    <input type="text" id="login" placeholder="Логин" autocomplete="off">
    <input type="password" id="password" placeholder="Пароль" onkeypress="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">Войти</button>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ryyhpmeyqqgptwxmczqa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_0BxkLpWWHDGPmxGdm31ywg_ZWGrjCf4';

    async function doLogin() {
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');
        
        if (!login || !password) {
            msgDiv.innerHTML = '<span class="error">Введите логин и пароль</span>';
            return;
        }
        
        msgDiv.innerHTML = '<span class="success">Проверяем...</span>';
        
        try {
            const url = `${SUPABASE_URL}/rest/v1/users?login=eq.${encodeURIComponent(login)}&password=eq.${encodeURIComponent(password)}`;
            const response = await fetch(url, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            
            const data = await response.json();
            console.log('Ответ сервера:', data);
            
            if (data && data.length > 0) {
                const user = data[0];
                if (user.status === 'archived') {
                    msgDiv.innerHTML = '<span class="error">Аккаунт архивирован</span>';
                    return;
                }
                msgDiv.innerHTML = `<span class="success">✅ Добро пожаловать, ${user.name}!</span>`;
                // Сохраняем пользователя
                localStorage.setItem('oko_user', JSON.stringify(user));
                // Показываем кнопку выхода и приветствие
                document.querySelector('.card').innerHTML = `
                    <h1>🏆 ОКОИНЫ</h1>
                    <div style="text-align:center; padding:20px;">
                        <p>✅ Вы вошли как <strong>${user.name}</strong></p>
                        <p>Роль: ${user.role === 'manager' ? 'Менеджер' : 'Сотрудник'}</p>
                        <p>⭐ Рейтинг: ${user.rating} | 💰 Баланс: ${user.points} ОКОИНОВ</p>
                        <button onclick="doLogout()" style="margin-top:20px;">Выйти</button>
                    </div>
                `;
            } else {
                msgDiv.innerHTML = '<span class="error">Неверный логин или пароль</span>';
            }
        } catch (err) {
            console.error('Ошибка:', err);
            msgDiv.innerHTML = '<span class="error">Ошибка соединения с сервером</span>';
        }
    }
    
    function doLogout() {
        localStorage.removeItem('oko_user');
        location.reload();
    }
    
    // Проверяем, есть ли сохранённый пользователь
    const savedUser = localStorage.getItem('oko_user');
    if (savedUser) {
        try {
            const user = JSON.parse(savedUser);
            document.querySelector('.card').innerHTML = `
                <h1>🏆 ОКОИНЫ</h1>
                <div style="text-align:center; padding:20px;">
                    <p>✅ Вы вошли как <strong>${user.name}</strong></p>
                    <p>Роль: ${user.role === 'manager' ? 'Менеджер' : 'Сотрудник'}</p>
                    <p>⭐ Рейтинг: ${user.rating} | 💰 Баланс: ${user.points} ОКОИНОВ</p>
                    <button onclick="doLogout()" style="margin-top:20px;">Выйти</button>
                </div>
            `;
        } catch(e) {}
    }
</script>
</body>
</html>
