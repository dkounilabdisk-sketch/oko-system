<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKOин — система мотивации</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f0ea 0%, #c8dfd6 100%); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .employee-card, .prize-card { background: white; border-radius: 20px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .btn { padding: 8px 18px; border-radius: 60px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.2s; }
        .btn-primary { background: #2d6a4f; color: white; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-warning { background: #f97316; color: white; }
        .level-badge { padding: 4px 12px; border-radius: 60px; font-size: 12px; font-weight: 700; }
        .level-bronze { background: #cd7f32; color: white; }
        .level-silver { background: #94a3b8; color: white; }
        .level-gold { background: #fbbf24; color: #1e293b; }
        .level-platinum { background: #c084fc; color: white; }
        .auth-panel { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
        input { padding: 10px 18px; border-radius: 60px; border: 1px solid #cbd5e1; font-family: inherit; }
        .notification { position: fixed; bottom: 20px; right: 20px; background: white; border-radius: 60px; padding: 12px 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; }
        @media (max-width: 700px) { .employee-card { flex-direction: column; align-items: stretch; } .btn-group { display: flex; justify-content: flex-end; } }
    </style>
</head>
<body>
<div id="app"></div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyHAYz-6A0bmdyhqK4lrLy1VvqKUzPdyqIqLgVtpQUGnaRRqDplOSye9MGZhE7Dwee03w/exec'; // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ URL

let currentUser = null;
let employees = [];
let prizes = [];

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'notification';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function callApi(action, data = {}) {
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...data })
        });
        return await res.json();
    } catch (e) {
        console.error(e);
        return { error: 'Ошибка связи' };
    }
}

async function login() {
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;
    const result = await callApi('login', { login, password });
    if (result.success) {
        currentUser = result.user;
        await loadData();
        renderApp();
        showToast(`Добро пожаловать, ${currentUser.name}`);
    } else {
        alert(result.error);
    }
}

async function loadData() {
    const empRes = await callApi('getEmployees');
    if (empRes.employees) employees = empRes.employees;
    const prizeRes = await callApi('getPrizes');
    if (prizeRes.prizes) prizes = prizeRes.prizes;
}

async function modifyPoints(empId, delta, reason) {
    const res = await callApi('updatePoints', { empId, delta, reason });
    if (res.success) {
        await loadData();
        renderApp();
        showToast(`✅ ${delta > 0 ? '+' : ''}${delta} OKO`);
    } else {
        alert('Ошибка');
    }
}

function getUserLevel(points) {
    if (points >= 500) return { name: 'Платина', color: 'platinum', emoji: '💎' };
    if (points >= 300) return { name: 'Золото', color: 'gold', emoji: '🥇' };
    if (points >= 100) return { name: 'Серебро', color: 'silver', emoji: '🥈' };
    return { name: 'Бронза', color: 'bronze', emoji: '🥉' };
}

function renderApp() {
    const isManager = currentUser?.role === 'manager';
    const isEmployee = currentUser?.role === 'employee';
    const level = currentUser ? getUserLevel(currentUser.rating || currentUser.points) : null;
    const html = `
        <div class="container">
            <div class="card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1 style="background: linear-gradient(135deg,#2d6a4f,#9b6bff); -webkit-background-clip: text; background-clip: text; color: transparent;">🏆 OKOин</h1>
                ${!currentUser ? `
                    <div class="auth-panel">
                        <input type="text" id="login" placeholder="Логин">
                        <input type="password" id="password" placeholder="Пароль">
                        <button class="btn btn-primary" id="loginBtn">Войти</button>
                    </div>
                ` : `
                    <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            ${currentUser.photo ? `<img src="${currentUser.photo}" class="avatar-small">` : '<div style="width:40px;height:40px;background:#ccc;border-radius:50%;"></div>'}
                            <div><strong>${currentUser.name}</strong><br><span class="level-badge level-${level.color}">${level.emoji} ${level.name} ⭐ ${currentUser.rating || currentUser.points}</span></div>
                        </div>
                        <button class="btn btn-secondary" id="logoutBtn">Выйти</button>
                        ${isEmployee ? `<button class="btn btn-secondary" id="changePwdBtn">Сменить пароль</button>` : ''}
                    </div>
                `}
            </div>
            ${currentUser ? `
                <div class="grid-2">
                    <div class="card">
                        <h3>👥 Команда</h3>
                        ${employees.map(emp => {
                            const empLevel = getUserLevel(emp.rating || emp.points);
                            return `
                                <div class="employee-card">
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        ${emp.photo ? `<img src="${emp.photo}" class="avatar-small">` : '<div style="width:40px;height:40px;background:#e2e8f0;border-radius:50%;"></div>'}
                                        <div><strong>${emp.name}</strong><br><span class="level-badge level-${empLevel.color}">${empLevel.emoji} ${empLevel.name} ⭐ ${emp.rating || emp.points}</span><br>💰 ${emp.points} OKO</div>
                                    </div>
                                    ${isManager ? `
                                        <div class="btn-group">
                                            <button class="btn btn-secondary" onclick="modifyPoints(${emp.id}, 5, 'Бонус')">+5</button>
                                            <button class="btn btn-secondary" onclick="modifyPoints(${emp.id}, 10, 'Премия')">+10</button>
                                            <button class="btn btn-warning" onclick="let a=prompt('Сумма списания'); if(a) modifyPoints(${emp.id}, -parseInt(a), 'Списание')">-</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                        ${isManager ? `<button class="btn btn-primary" id="addUserBtn">➕ Добавить сотрудника</button>` : ''}
                    </div>
                    <div class="card">
                        <h3>🎁 Призы</h3>
                        ${prizes.map(p => `
                            <div class="prize-card" onclick="alert('${p.desc}\\nСтоимость: ${p.cost} OKO')">
                                <div><strong>${p.name}</strong><br>${p.desc}</div>
                                <div class="level-badge level-gold">${p.cost} OKO</div>
                            </div>
                        `).join('')}
                        ${isEmployee ? `<div style="margin-top: 16px; padding: 12px; background: #e0f2fe; border-radius: 20px;">🎯 Доступно: ${prizes.filter(p => p.cost <= currentUser.points).length} призов</div>` : ''}
                    </div>
                </div>
            ` : ''}
        </div>
    `;
    document.getElementById('app').innerHTML = html;
    if (!currentUser) {
        document.getElementById('loginBtn')?.addEventListener('click', login);
    } else {
        document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; renderApp(); });
        document.getElementById('changePwdBtn')?.addEventListener('click', async () => {
            const old = prompt('Текущий пароль');
            const newPwd = prompt('Новый пароль (мин 8, заглавная, цифра, спецсимвол)');
            if (old && newPwd) {
                const res = await callApi('changePassword', { login: currentUser.login, oldPassword: old, newPassword: newPwd });
                if (res.success) alert('Пароль изменён');
                else alert(res.error);
            }
        });
        document.getElementById('addUserBtn')?.addEventListener('click', async () => {
            const name = prompt('Имя');
            const surname = prompt('Фамилия');
            const login = prompt('Логин');
            const password = prompt('Пароль (мин 8, заглавная, цифра, спецсимвол)');
            const points = prompt('Начальные баллы', 0);
            if (name && surname && login && password) {
                const res = await callApi('addUser', { name, surname, login, password, points: parseInt(points) });
                if (res.success) { await loadData(); renderApp(); showToast('Сотрудник добавлен'); }
                else alert(res.error);
            }
        });
    }
}

renderApp();
</script>
</body>
</html>
